<!DOCTYPE html>
<html>
<head>
    <title>Contact n Stuff</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>

        <!-- Navigation -->
    <nav id="mainnav" >
        <a href="index.html">Home</a> |
        <a href="page2.html">Story</a> |
        <a href="contact.html">Contact</a> |

    <hr>

    <h1>Contact (Me)</h1>
    <p class="textBlock">Please do not. I do bite.</p>

    <form onsubmit="return validateForm()">
        <!-- Name -->
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <!-- Email -->
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <!-- Terms Agreement -->
        <p>Do you accept the terms?</p>
        <input type="radio" id="yes" name="terms" value="yes" required>
        <label for="yes">Yes</label><br>

        <input type="radio" id="no" name="terms" value="no">
        <label for="no">No</label><br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">
    </form>

    <script>
    function validateForm() {
        let name = document.getElementById("name");
        let email = document.getElementById("email");
        let terms = document.querySelector('input[name="terms"]:checked');

        // Reset borders
        name.style.border = "";
        email.style.border = "";

        // Name check
        if (name.value.trim() === "") {
            name.style.border = "2px solid red";
            name.focus();
            return false;
        }

        // Email check
        if (email.value.trim() === "") {
            email.style.border = "2px solid red";
            email.focus();
            return false;
        }

        // Terms check
        if (!terms) {
            alert("You must accept the terms.");
            document.getElementById("yes").focus();
            return false;
        }

        return true;
    }
    </script>

</body>
</html>
